name: cd

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Set up npm
        run: npm install -g npm@11.17.0

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: Build and push to GAR
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/sinuous-concept-502302-a4/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/sinuous-concept-502302-a4/notely-ar-repo/notely:latest --region us-central1 -allow-unauthenticated --project sinuous-concept-502302-a4 --max-instances=4
